name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy pandas pyyaml scikit-learn Pillow requests
      - name: Ruff
        run: ruff check .
      - name: Pytest
        env:
          WANDB_MODE: disabled
        run: pytest -q
