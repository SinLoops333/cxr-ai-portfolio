services:
  copilot:
    build:
      context: ..
      dockerfile: docker/copilot.Dockerfile
    image: cxr-copilot:latest
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - HF_HOME=/app/.cache/hf
      - COPILOT_ARTIFACTS=/app/artifacts
    volumes:
      - ../checkpoints:/app/checkpoints:ro
      - ../data:/app/data:ro
      - ../artifacts:/app/artifacts
    command: >
      sh -c "uvicorn project_a_copilot.app.api:app --host 0.0.0.0 --port 8000 &
             streamlit run project_a_copilot/frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 &
             wait"

  synth:
    build:
      context: ..
      dockerfile: docker/synth.Dockerfile
    image: cxr-synth:latest
    ports:
      - "7860:7860"
    environment:
      - HF_HOME=/app/.cache/hf
    volumes:
      - ../checkpoints:/app/checkpoints:ro
      - ../data:/app/data:ro
